<h3>Bem vindo, {{ acount?.name }} !</h3>

<div class="cards-container-full">
  <mat-card class="cards-full" appearance="raised">
    <mat-card-content>
      <p>Saldo disponível</p>
      <strong>{{ (balance$ | async) | currency:'BRL':'symbol-narrow':'1.2-2' }}</strong>
      <div class="cards-container">
        <p>Agência 0001</p>
        <p>Conta 123456-7</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>

<div class="cards-container">
  <mat-card class="cards" appearance="outlined">
      <mat-card-content> Receitas (mês)
        <p>{{this.totalReceita | currency}}</p>
      </mat-card-content>
  </mat-card>

  <mat-card class="cards" appearance="outlined">
    <mat-card-content> Despesas (mês)
      <p>{{this.totalDespesa | currency}}</p>
    </mat-card-content>
  </mat-card>

  <mat-card class="cards" appearance="outlined">
    <mat-card-content> Saldo do período 
      <p>{{this.saldoPeriodo | currency}}</p>
    </mat-card-content>
  </mat-card>
</div>
