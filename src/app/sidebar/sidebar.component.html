<button
  class="sidebar-toggle"
  type="button"
  (click)="toggle()"
  aria-label="Abrir/fechar menu"
>
  <mat-icon
    height="24"
    viewBox="0 0 24 24"
    aria-hidden="true"
    aria-label="Notificações"
    fontIcon="menu"
  ></mat-icon>
</button>

<!-- backdrop para mobile -->
<div
  class="sidebar-backdrop"
  [class.open]="open()"
  onkeypress="open()"
  (click)="close()"
  aria-hidden="true"
></div>

<nav
  class="sidebar"
  [class.open]="open()"
  role="navigation"
  aria-label="Menu lateral"
>
  @for (item of menuItems; track $index) {
  <button
    class="sidebar-item"
    matFab
    extended
    (click)="redirectToPage()"
    [routerLink]="`/${item.page}`"
  >
    <mat-icon>{{ item.icon }}</mat-icon>
    {{ item.label }}
  </button>
  }
</nav>
