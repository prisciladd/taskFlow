<h2 mat-dialog-title>Confirmação</h2>
<mat-dialog-content>
  <p>Confirma a exclusão do registro?</p>
</mat-dialog-content>
<mat-dialog-actions>
  <button class="btn btn-sm btn-outline-primary me-2" (click)="onNoClick()">
    Não
  </button>
  <button
    class="btn btn-sm btn-outline-danger"
    [mat-dialog-close]=""
    cdkFocusInitial
  >
    Sim
  </button>
</mat-dialog-actions>
