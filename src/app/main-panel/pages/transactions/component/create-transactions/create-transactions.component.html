<!-- create-transactions.component.html -->
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="txn-form">
  <div class="txn-grid">
    <!-- Data -->
    <mat-form-field appearance="outline" class="full">
      <mat-label>Escolha uma data</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-hint>DD/MM/YYYY</mat-hint>
      <mat-datepicker-toggle
        matIconSuffix
        [for]="picker"
      ></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <!-- Descrição -->
    <mat-form-field appearance="outline" class="full">
      <mat-label>Descrição</mat-label>
      <input
        matInput
        placeholder="Descreva a transação"
        formControlName="description"
      />
      <mat-hint>Preencha a descrição.</mat-hint>
      <mat-error> A descrição precisa ter no mínimo 5 caracteres </mat-error>
    </mat-form-field>

    <!-- Valor -->
    <mat-form-field appearance="outline" class="half">
      <mat-label>Valor</mat-label>
      <input
        matInput
        placeholder="Informe o valor da transação"
        formControlName="amount"
        mask="separator.2"
        thousandSeparator="."
        decimalMarkers=","
        prefix="R$ "
      />
    </mat-form-field>

    <!-- Tipo -->
    <mat-form-field appearance="outline" class="half">
      <mat-label>Tipo de transação</mat-label>
      <mat-select formControlName="type">
        <mat-option [value]="transactionTypesEnum.INCOME">Entrada</mat-option>
        <mat-option [value]="transactionTypesEnum.EXPENSE">Saída</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="txn-actions-row">
    <button
      type="button"
      class="btn btn-outline-primary"
      (click)="redirectToList()"
    >
      Voltar
    </button>
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
      Submit
    </button>
  </div>
</form>
